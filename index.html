<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPKID 7.0 | Pro Media Hub</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { background: #08080a; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Panels */
        #movieWatch, #musicWatch, #searchOverlay { 
            transform: translateY(100%); 
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); 
            position: fixed; inset: 0; z-index: 5000; background: #000; overflow-y: auto; 
        }
        .active-panel { transform: translateY(0) !important; }
        
        .tab-btn { font-size: 10px; font-weight: 800; color: #555; transition: 0.3s; }
        .tab-active { color: #ef4444; }

        .ep-card { background: rgba(255,255,255,0.03); border-radius: 20px; transition: 0.3s; }
        .ep-card:active { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="pb-24">

    <nav class="fixed top-0 w-full z-[1000] glass border-none px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2" onclick="location.reload()">
            <div class="w-9 h-9 bg-red-700 rounded-xl flex items-center justify-center font-bold text-sm shadow-lg">PK</div>
            <h1 class="text-xl font-bold tracking-tighter uppercase">Popkid <span class="text-[10px] text-red-500 font-bold ml-1">7.0</span></h1>
        </div>
        <div class="flex gap-4">
            <button onclick="togglePanel('searchOverlay', true)" class="w-11 h-11 rounded-2xl flex items-center justify-center bg-white/5 border border-white/5"><i class="fa-solid fa-magnifying-glass text-sm"></i></button>
            <button class="w-11 h-11 rounded-2xl flex items-center justify-center bg-white/5 border border-white/5"><i class="fa-solid fa-bars-staggered text-sm"></i></button>
        </div>
    </nav>

    <div class="fixed top-20 w-full z-[900] glass border-none px-6 py-2 flex gap-8 justify-center">
        <button id="movieTab" onclick="switchMainTab('movies')" class="tab-btn tab-active py-2 uppercase">Movies</button>
        <button id="musicTab" onclick="switchMainTab('music')" class="tab-btn py-2 uppercase">Music Hub</button>
        <button id="libraryTab" onclick="switchMainTab('library')" class="tab-btn py-2 uppercase">Offline</button>
    </div>

    <main id="movieView" class="pt-36 px-6">
        <header id="hero" class="h-[50vh] relative flex items-end p-8 rounded-[40px] overflow-hidden bg-cover bg-center mb-10 transition-all duration-700">
            <div class="relative z-10 w-full">
                <h2 id="heroTitle" class="text-3xl font-black mb-4 truncate italic uppercase tracking-tighter">Popkid Streaming</h2>
                <button id="heroPlay" class="w-full bg-red-600 py-4 rounded-2xl font-bold shadow-lg shadow-red-600/20 active:scale-95 transition-all"><i class="fa-solid fa-play mr-2"></i> Watch Now</button>
            </div>
            <div class="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-transparent"></div>
        </header>

        <section class="mb-10">
            <h3 class="font-black text-xl mb-6 italic text-zinc-400">MOST PLAYED</h3>
            <div id="movieGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-5"></div>
        </section>
    </main>

    <main id="musicView" class="hidden pt-36 px-6 pb-20">
        <div class="glass p-2 rounded-2xl flex items-center border border-white/10 mb-10">
            <input type="text" id="musicQuery" placeholder="Search YouTube & Music..." class="flex-1 bg-transparent p-4 outline-none text-sm">
            <button onclick="handleMusicSearch()" class="bg-red-600 px-6 py-4 rounded-xl font-bold text-xs uppercase">Search</button>
        </div>
        <div id="musicGrid" class="grid grid-cols-2 md:grid-cols-4 gap-5"></div>
    </main>

    <main id="libraryView" class="hidden pt-36 px-6">
        <h3 class="text-xs font-bold text-zinc-500 uppercase tracking-widest mb-8 italic">Your Offline Collection</h3>
        <div id="libraryList" class="grid grid-cols-2 md:grid-cols-4 gap-5"></div>
    </main>

    <div id="searchOverlay" class="p-8 pt-20">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black">Search Movies</h2>
            <button onclick="togglePanel('searchOverlay', false)" class="bg-white/5 px-4 py-2 rounded-xl text-xs font-bold uppercase">Back</button>
        </div>
        <input id="mainSearch" onkeyup="handleMainSearch()" type="text" placeholder="Start typing to search..." class="w-full bg-zinc-900 p-5 rounded-3xl outline-none border border-white/5 focus:border-red-600/50 transition-all">
        <div id="searchResultGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 mt-8"></div>
    </div>

    <div id="movieWatch">
        <div class="p-6 flex justify-between items-center fixed top-0 w-full z-[6000]">
            <button onclick="togglePanel('movieWatch', false)" class="w-12 h-12 rounded-full glass flex items-center justify-center"><i class="fa-solid fa-chevron-down"></i></button>
            <a id="movieDl" href="#" target="_blank" class="w-12 h-12 rounded-full bg-green-600 flex items-center justify-center shadow-lg"><i class="fa-solid fa-download"></i></a>
        </div>
        <div id="moviePlayerArea"></div>
    </div>

    <div id="musicWatch">
        <div class="p-6 flex justify-between items-center fixed top-0 w-full z-[6000]">
            <button onclick="togglePanel('musicWatch', false)" class="w-12 h-12 rounded-full glass flex items-center justify-center"><i class="fa-solid fa-chevron-down"></i></button>
            <button id="musicSaveBtn" class="bg-blue-600 px-6 py-3 rounded-xl font-bold text-[10px] uppercase">Save Offline</button>
        </div>
        <div class="pt-24 px-6 max-w-2xl mx-auto">
            <video id="musicPlayer" class="w-full aspect-video rounded-[30px] bg-zinc-900 shadow-2xl" controls></video>
            <h2 id="musicWatchTitle" class="text-2xl font-bold mt-8">Media Loading...</h2>
        </div>
    </div>

    <script>
        const TMDB_KEY = '29e4dc2f40c6d85baa182bb1e1f38911';
        const YT_SEARCH = "https://api.yupra.my.id/api/search/youtube?q=";
        const YT_DL = "https://jawad-tech.vercel.app/download/ytdl?url=";
        const IMG = 'https://image.tmdb.org/t/p/w500';
        let db;

        // DB INIT
        const request = indexedDB.open("PopkidFinalDB", 1);
        request.onupgradeneeded = (e) => e.target.result.createObjectStore("videos", { keyPath: "id" });
        request.onsuccess = (e) => { db = e.target.result; renderLibrary(); };

        // TABS
        function switchMainTab(tab) {
            document.getElementById('movieView').classList.toggle('hidden', tab !== 'movies');
            document.getElementById('musicView').classList.toggle('hidden', tab !== 'music');
            document.getElementById('libraryView').classList.toggle('hidden', tab !== 'library');
            document.getElementById('movieTab').classList.toggle('tab-active', tab === 'movies');
            document.getElementById('musicTab').classList.toggle('tab-active', tab === 'music');
            document.getElementById('libraryTab').classList.toggle('tab-active', tab === 'library');
            if(tab === 'music') loadMusicTrending();
        }

        function togglePanel(id, show) {
            document.getElementById(id).classList.toggle('active-panel', show);
            document.body.style.overflow = show ? 'hidden' : 'auto';
        }

        // MOVIE LOGIC (RESTORED FULL FUNCTIONALITY)
        async function initMovies() {
            const res = await fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${TMDB_KEY}`);
            const data = await res.json();
            const top = data.results[0];
            document.getElementById('hero').style.backgroundImage = `linear-gradient(to top, #000, transparent), url(https://image.tmdb.org/t/p/original${top.backdrop_path})`;
            document.getElementById('heroTitle').innerText = top.title || top.name;
            document.getElementById('heroPlay').onclick = () => openMovieWatch(top.id, top.media_type || 'movie');
            renderMovieGrid(data.results.slice(1, 13), 'movieGrid');
        }

        function renderMovieGrid(items, targetId) {
            document.getElementById(targetId).innerHTML = items.map(item => `
                <div onclick="openMovieWatch(${item.id}, '${item.media_type || (item.title?'movie':'tv')}')" class="glass rounded-[32px] p-3 active:scale-95 transition-all">
                    <img src="${IMG + item.poster_path}" class="w-full h-48 object-cover rounded-[24px] mb-3 shadow-lg">
                    <h4 class="text-[10px] font-bold truncate px-1 uppercase tracking-tighter">${item.title || item.name}</h4>
                </div>`).join('');
        }

        async function openMovieWatch(id, type) {
            const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_KEY}&append_to_response=videos`);
            const item = await res.json();
            togglePanel('movieWatch', true);
            document.getElementById('movieDl').href = `https://vidsrc.xyz/download/${type}/${id}`;
            
            let html = `
                <iframe id="moviePlayer" src="https://vidsrc.me/embed/${type}?tmdb=${id}" class="w-full aspect-video rounded-b-[40px] shadow-2xl" frameborder="0" allowfullscreen></iframe>
                <div class="p-8">
                    <h2 class="text-3xl font-black mb-2">${item.title || item.name}</h2>
                    <p class="text-[10px] text-zinc-500 mb-6 uppercase font-bold tracking-widest">${(item.release_date || item.first_air_date || '').split('-')[0]} • HD STREAM</p>
                    <p class="text-xs text-zinc-400 mb-8 leading-relaxed">${item.overview}</p>
            `;

            if(type === 'tv') {
                html += `
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-sm tracking-widest uppercase text-zinc-600">Series Seasons</h3>
                    <select onchange="fetchSeriesEps(${id}, this.value)" class="bg-zinc-900 border border-white/5 p-2 rounded-xl text-xs outline-none">
                        ${item.seasons.filter(s => s.season_number > 0).map(s => `<option value="${s.season_number}">${s.name}</option>`).join('')}
                    </select>
                </div>
                <div id="epGrid" class="space-y-4 pb-24"></div>`;
                setTimeout(() => fetchSeriesEps(id, 1), 100);
            }
            document.getElementById('moviePlayerArea').innerHTML = html + `</div>`;
        }

        async function fetchSeriesEps(id, s) {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${s}?api_key=${TMDB_KEY}`);
            const data = await res.json();
            document.getElementById('epGrid').innerHTML = data.episodes.map(ep => `
                <div onclick="playMovieEp(${id}, ${s}, ${ep.episode_number})" class="glass p-4 rounded-[28px] flex gap-5 items-center ep-card">
                    <div class="relative w-24 h-14 bg-zinc-900 rounded-2xl overflow-hidden flex-shrink-0">
                        <img src="${ep.still_path ? IMG + ep.still_path : ''}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 flex items-center justify-center bg-black/30"><i class="fa-solid fa-play text-[10px]"></i></div>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <p class="text-[11px] font-black truncate uppercase">${ep.name}</p>
                        <p class="text-[9px] text-zinc-500 font-bold mt-1">S${s} E${ep.episode_number}</p>
                    </div>
                </div>`).join('');
        }

        function playMovieEp(id, s, e) {
            document.getElementById('moviePlayer').src = `https://vidsrc.me/embed/tv?tmdb=${id}&season=${s}&episode=${e}`;
            document.getElementById('movieDl').href = `https://vidsrc.xyz/download/tv/${id}/${s}/${e}`;
            window.scrollTo({top:0, behavior:'smooth'});
        }

        // SEARCH (RESTORED SUGGESTIONS)
        async function handleMainSearch() {
            const q = document.getElementById('mainSearch').value;
            if(q.length > 2) {
                const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${q}`);
                const data = await res.json();
                renderMovieGrid(data.results, 'searchResultGrid');
            }
        }

        // MUSIC & OFFLINE (KEPT YOUR MUSIC FUNCTIONALITY)
        async function loadMusicTrending() {
            const res = await axios.get(`${YT_SEARCH}trending music videos 2026`);
            document.getElementById('musicGrid').innerHTML = res.data.results.map(v => `
                <div onclick="openMusicWatch('${v.url}')" class="glass p-3 rounded-[32px] active:scale-95 transition-all">
                    <img src="${v.thumbnail}" class="w-full h-40 object-cover rounded-[24px] mb-3 shadow-lg">
                    <h4 class="text-[10px] font-bold line-clamp-2 px-1 tracking-tight">${v.title}</h4>
                </div>`).join('');
        }

        async function openMusicWatch(url) {
            togglePanel('musicWatch', true);
            const res = await axios.get(`${YT_DL}${encodeURIComponent(url)}`);
            const data = res.data.result;
            const p = document.getElementById('musicPlayer');
            p.src = data.mp4;
            p.poster = data.thumbnail;
            document.getElementById('musicWatchTitle').innerText = data.title;
            document.getElementById('musicSaveBtn').onclick = () => saveVid(data.mp4, Date.now(), data.title, data.thumbnail);
            p.play();
        }

        async function saveVid(url, id, title, thumb) {
            const res = await fetch(url);
            const blob = await res.blob();
            const tx = db.transaction("videos", "readwrite");
            tx.objectStore("videos").put({ id, title, data: blob, thumb });
            tx.oncomplete = () => { renderLibrary(); alert("Saved Offline!"); };
        }

        function renderLibrary() {
            db.transaction("videos", "readonly").objectStore("videos").getAll().onsuccess = (e) => {
                document.getElementById('libraryList').innerHTML = e.target.result.map(v => `
                    <div class="glass p-4 rounded-[30px] text-center">
                        <img src="${v.thumb}" class="w-full h-32 object-cover rounded-3xl mb-4">
                        <h4 class="text-[10px] font-bold truncate mb-4 px-1">${v.title}</h4>
                        <button onclick="playOffline('${v.id}')" class="w-full bg-red-600 py-3 rounded-2xl text-[9px] font-black uppercase">Play Offline</button>
                    </div>`).join('');
            };
        }

        function playOffline(id) {
            db.transaction("videos", "readonly").objectStore("videos").get(id).onsuccess = (e) => {
                const v = e.target.result;
                togglePanel('musicWatch', true);
                const p = document.getElementById('musicPlayer');
                p.src = URL.createObjectURL(v.data);
                document.getElementById('musicWatchTitle').innerText = v.title + " (OFFLINE)";
                p.play();
            };
        }

        initMovies();
    </script>
</body>
</html>
